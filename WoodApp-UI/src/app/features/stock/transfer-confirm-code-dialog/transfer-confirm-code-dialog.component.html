<div class="modal-header">
    <h2 mat-dialog-title>
        <mat-icon>verified_user</mat-icon>
        Sécurisation du Transfert
    </h2>
</div>

<div mat-dialog-content class="dialog-content-centered">
    <div class="shield-icon-container">
        <mat-icon class="shield-icon">lock</mat-icon>
    </div>
    
    <h3>Authentification du chauffeur</h3>
    <p class="description-text">Veuilez saisir le code de confirmation unique reçu par le transporteur pour finaliser la réception.</p>

    <mat-form-field appearance="outline" class="w-100 otp-field">
        <mat-label>Code de confirmation</mat-label>
        <input matInput type="text" inputmode="numeric" maxLength="6" pattern="[0-9]*" [(ngModel)]="confirmationCode" #codeInput
            (keyup.enter)="onConfirm()" placeholder="••••" [disabled]="loading" required>
        <mat-icon matPrefix>key</mat-icon>
        <mat-hint *ngIf="errorMessage" class="error-text">
            <mat-icon style="font-size: 14px; width: 14px; height: 14px;">error_outline</mat-icon>
            {{ errorMessage }}
        </mat-hint>
    </mat-form-field>
</div>

<div mat-dialog-actions class="dialog-actions-premium">
    <button mat-button (click)="onCancel()" [disabled]="loading" class="secondary-btn">Annuler</button>
    <div class="actions-spacer"></div>
    <button mat-flat-button color="primary" (click)="onConfirm()" [disabled]="loading || !confirmationCode"
        class="confirm-button-premium">
        <mat-spinner *ngIf="loading" diameter="20" class="inline-spinner"></mat-spinner>
        <span *ngIf="!loading">Finaliser la Réception</span>
    </button>
</div>
