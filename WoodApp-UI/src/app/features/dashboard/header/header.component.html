<mat-toolbar class="modern-header">
  <!-- Left section: Hamburger & Title -->
  <div class="header-left">
    <button mat-icon-button class="menu-btn" *ngIf="sidenav.mode === 'over'" (click)="sidenav.toggle()">
      <mat-icon *ngIf="!sidenav.opened">menu</mat-icon>
      <mat-icon *ngIf="sidenav.opened">close_fullscreen</mat-icon>
    </button>
    <div class="date-display">
      <mat-icon class="date-icon">calendar_today</mat-icon>
      {{date | date:'d MMMM y'}}
    </div>
  </div>

  <span class="spacer"></span>

  <!-- Right section: User actions -->
  <div class="header-right" *ngIf="isLoggedIn()">
    <ng-container *ngIf="authService.getUserDetail() as userDetail">

      <!-- Role / Site info bubble -->
      <div class="site-chip">
        <mat-icon>storefront</mat-icon>
        <span class="site-name">{{SalesSite || 'Chargement...'}}</span>
      </div>

      <!-- Notification Bell -->
      <button mat-icon-button class="action-btn" [matMenuTriggerFor]="notificationsMenu">
        <mat-icon [matBadge]="notificationService.getPendingNotifications().length" matBadgeColor="warn"
          [matBadgeHidden]="notificationService.getPendingNotifications().length === 0"
          class="bell-icon">notifications</mat-icon>
      </button>

      <mat-menu #notificationsMenu="matMenu" class="modern-notif-menu">
        <div class="notif-header">
          <h3>Notifications</h3>
          <span class="badge">{{notificationService.getPendingNotifications().length}}</span>
        </div>
        <mat-divider></mat-divider>

        <div *ngIf="notificationService.getPendingNotifications().length === 0" class="empty-state">
          <mat-icon>notifications_paused</mat-icon>
          <p>Aucune notification</p>
        </div>

        <ng-container *ngIf="notificationService.getPendingNotifications().length > 0">
          <button *ngFor="let notif of notificationService.getPendingNotifications()" mat-menu-item
            (click)="openTransferConfirmation(notif)" class="notification-item">
            <div class="notif-icon-wrapper">
              <mat-icon>move_to_inbox</mat-icon>
            </div>
            <div class="notification-content">
              <div class="notif-title">Transfert depuis {{notif.originSite}}</div>
              <div class="notif-desc">Docs: Sortie N° {{notif.exitDocNumber}} - {{notif.itemsCount}} articles</div>
            </div>
          </button>
        </ng-container>
      </mat-menu>

      <!-- Settings -->
      <button mat-icon-button class="action-btn hidden-xs" routerLink="config" matTooltip="Paramètres">
        <mat-icon>settings</mat-icon>
      </button>

      <!-- User Profile Dropdown -->
      <button mat-button class="user-profile-btn" [matMenuTriggerFor]="profileMenu">
        <div class="avatar-circle">
          {{ nameOfConnectedUser ? nameOfConnectedUser.charAt(0).toUpperCase() : 'U' }}
        </div>
        <div class="user-info hidden-xs">
          <span class="user-name">{{nameOfConnectedUser}}</span>
          <span class="user-role">{{getRoleTranslated(userDetail.role)}}</span>
        </div>
        <mat-icon class="dropdown-icon">expand_more</mat-icon>
      </button>

      <mat-menu #profileMenu="matMenu" class="modern-profile-menu">
        <div class="profile-header-sm visible-xs">
          <div class="user-name">{{nameOfConnectedUser}}</div>
        </div>
        <mat-divider class="visible-xs"></mat-divider>
        <button mat-menu-item (click)="openProfileModal()">
          <mat-icon>account_circle</mat-icon>
          <span>Mon Profil</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()" class="logout-btn">
          <mat-icon>logout</mat-icon>
          <span>Déconnexion</span>
        </button>
      </mat-menu>
    </ng-container>
  </div>
</mat-toolbar>
