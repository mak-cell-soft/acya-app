<div class="calendar-container">
  <div class="calendar-header">
    <h2>{{ getMonthName() }}</h2>
    <div class="controls">
      <button (click)="prevMonth()" matTooltip="Mois Précédent">
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button (click)="nextMonth()" matTooltip="Mois Suivant">
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading-overlay">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading">
    <div class="calendar-grid">
      <!-- Weekday headers -->
      <div class="day-name">Lun</div>
      <div class="day-name">Mar</div>
      <div class="day-name">Mer</div>
      <div class="day-name">Jeu</div>
      <div class="day-name">Ven</div>
      <div class="day-name">Sam</div>
      <div class="day-name">Dim</div>

      <!-- Days -->
      <div *ngFor="let day of calendarDays" 
           class="calendar-day" 
           [class.not-current]="!day.isCurrentMonth"
           [class.today]="day.isToday">
        
        <div class="day-number">{{ day.date | date:'d' }}</div>
        
        <div class="events-container">
          <div *ngFor="let leave of day.leaves" 
               class="leave-event"
               [style.background-color]="getLeaveColor(leave.leavetype)"
               [matTooltip]="leave.employeename + ' - ' + leave.leavetype">
            <span>•</span> {{ leave.employeename }}
          </div>
        </div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="dot" style="background-color: #4f46e5;"></div>
        <span>Congé Payé</span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background-color: #ef4444;"></div>
        <span>Maladie</span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background-color: #f59e0b;"></div>
        <span>Sans Solde</span>
      </div>
      <div class="legend-item">
        <div class="dot" style="background-color: #10b981;"></div>
        <span>Autres</span>
      </div>
    </div>
  </div>
</div>
