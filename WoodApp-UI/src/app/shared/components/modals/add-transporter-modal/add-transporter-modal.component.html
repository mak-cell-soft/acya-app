<div class="modal-wrapper mat-typography">
    <div class="modal-header">
        <div class="header-title">
            <mat-icon>local_shipping</mat-icon>
            <h2>Ajouter un nouveau Transporteur</h2>
        </div>
        <button mat-icon-button (click)="onCancel()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="modal-content" [formGroup]="transporterForm">
        <div class="form-section">
            <div class="section-title">
                <mat-icon>person</mat-icon>
                <span>Informations du Chauffeur</span>
            </div>
            <div class="form-grid">
                <mat-form-field appearance="outline">
                    <mat-label>Prénom Chauffeur</mat-label>
                    <input matInput formControlName="transpSurname">
                    <mat-icon matPrefix>person</mat-icon>
                    <mat-error *ngIf="transporterForm.get('transpSurname')?.hasError('required')">Requis</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Nom Chauffeur</mat-label>
                    <input matInput formControlName="transpName">
                    <mat-icon matPrefix>person</mat-icon>
                    <mat-error *ngIf="transporterForm.get('transpName')?.hasError('required')">Requis</mat-error>
                </mat-form-field>
            </div>
        </div>

        <div class="form-section">
            <div class="section-title">
                <mat-icon>badge</mat-icon>
                <span>Détails du Véhicule</span>
            </div>
            <div class="form-grid vehicle-grid">
                <mat-form-field appearance="outline">
                    <mat-label>Série</mat-label>
                    <input matInput formControlName="serie" placeholder="123" />
                    <mat-icon matPrefix>directions_car</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Type</mat-label>
                    <mat-select formControlName="letter">
                        <mat-option *ngFor="let s of allSeries" [value]="s.id">{{s.value}}</mat-option>
                    </mat-select>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Numéro</mat-label>
                    <input matInput formControlName="number" placeholder="1234"/>
                    <mat-icon matPrefix>tag</mat-icon>
                </mat-form-field>
            </div>
        </div>
    </div>

    <div class="modal-actions">
        <button mat-button color="warn" (click)="onCancel()" class="btn-cancel">
            {{abort_button_text}}
        </button>
        <button mat-raised-button color="primary" [disabled]="!transporterForm.valid" (click)="onSubmit()" class="btn-save">
            <mat-icon>save</mat-icon>
            {{register_button_text}}
        </button>
    </div>
</div>
