<div class="modal-wrapper alert mat-typography">
    <div class="modal-header">
        <div class="header-title">
            <mat-icon>warning</mat-icon>
            <h2>Confirmation de suppression</h2>
        </div>
        <button mat-icon-button (click)="cancel()" class="close-btn">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="modal-content text-center">
        <div class="alert-icon-wrapper">
            <mat-icon>delete_forever</mat-icon>
        </div>
        
        <p class="main-msg">Voulez-vous vraiment supprimer <strong>{{ data.item?.name || 'cet élément' }}</strong> ?</p>
        <p class="sub-msg">Cette action est irréversible et toutes les données associées seront perdues.</p>
    </div>

    <div class="modal-actions full-width-buttons">
        <button mat-stroked-button (click)="cancel()" class="btn-cancel">
            Annuler
        </button>
        <button mat-raised-button color="warn" (click)="confirmDelete()" class="btn-delete">
            <mat-icon>delete</mat-icon> Supprimer
        </button>
    </div>
</div>
