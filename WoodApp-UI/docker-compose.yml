services:
  # Angular SSR Application
  woodapp-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: woodapp-ui
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      # Backend API URL - Update this to your actual backend service
      - API_URL=https://your-backend-api:44306/api
    restart: unless-stopped
    networks:
      - woodapp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
  #   container_name: woodapp-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - woodapp-ui
  #   restart: unless-stopped
  #   networks:
  #     - woodapp-network

networks:
  woodapp-network:
    driver: bridge
