version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wood-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "wood_app_strong_db_password_270326"
      POSTGRES_DB: wood-app-db
      APP_DB: app-db-bo
      PGDATA: /var/lib/postgresql/data/pgdata
#    ports:
#      - "5432:5432"
    volumes:
      # This is my old DB
      #- ./wood-app.api/postgres-data:/var/lib/postgresql/data
      # This is my new DB
      - ./wood-app.api/postgres-data-new_for_ahmed:/var/lib/postgresql/data
      - ./wood-app.api/db:/docker-entrypoint-initdb.d:ro
    networks:
      - wood-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wood-app-db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  # .NET Web API
  api:
    build:
      context: ./wood-app.api
      dockerfile: Dockerfile
    container_name: wood-app-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__WoodAppContextConnection=Host=postgres;Port=5432;Database=wood-app-db;Username=postgres;Password=wood_app_strong_db_password_270326;
      - ConnectionStrings__AppContextConnection=Host=postgres;Port=5432;Database=app-db-bo;Username=postgres;Password=wood_app_strong_db_password_270326;
      - TokenKey=wood_app_super_secret_unguessable_key_For_FrontEnd_$$&&!_xzawwo9985error,ughjjnp21365_##1
      - JWTSettings__securityKey=wood_app_super_secret_unguessable_key_For_FrontEnd_$$&&!_xzawwo9985error,ughjjnp21365_##1
      - JWTSettings__ValidAudience=https://acya.site
      - JWTSettings__ValidIssuer=https://acya.site/api/
      - AllowedOrigins=https://acya.site,https://www.acya.site
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wood-app-network

  # Angular UI (SSR)
  ui:
    build:
      context: ./WoodApp-UI
      dockerfile: Dockerfile
    container_name: wood-app-ui
    restart: unless-stopped
    environment:
      - PORT=4000
      - NODE_ENV=production
      - API_URL=https://acya.site/api/
    ports:
      - "4000:4000"
    depends_on:
      - api
    networks:
      - wood-app-network

networks:
  wood-app-network:
    driver: bridge

